<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Performance optimizations -->
    <meta name="theme-color" content="#4ECDC4" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- Critical resource preloads -->
    <link rel="preload" as="image" href="/lovable-uploads/25c56481-0d03-4055-bd47-67635ac0d1b0.webp" fetchpriority="high">
    <link rel="preload" as="image" href="/lovable-uploads/c910d35f-a4b2-4c06-88e3-7f5b16a45558.webp" fetchpriority="high">
    
    <!-- Critical CSS for branded loading screen -->
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #0f3a3a;
      }
      .hero-loading {
        min-height: 100vh;
        background: radial-gradient(circle at 50% 30%, #1a5f5f 0%, #0f3a3a 60%, #082020 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        color: #fff;
      }
      .hero-loading .brand {
        font-size: 1.05rem;
        font-weight: 800;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.9);
      }
      .hero-loading .ring {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 3px solid rgba(78, 205, 196, 0.18);
        border-top-color: #4ECDC4;
        animation: hl-spin 0.9s linear infinite;
        box-shadow: 0 0 32px rgba(78, 205, 196, 0.35);
      }
      .hero-loading .tag {
        font-size: 0.72rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.55);
      }
      @keyframes hl-spin { to { transform: rotate(360deg); } }
    </style>
    
    <title>Shazam Parking — Dubai's Trusted Monthly Parking Platform</title>
    <meta name="description" content="Shazam Parking is Dubai's trusted platform to rent or list monthly parking. Book verified spots in Marina, Downtown, DIFC, Business Bay, Palm Jumeirah and Deira — or earn passive income from your unused bay." />
    <meta name="author" content="Shazam Parking" />
    <meta name="keywords" content="Dubai parking, monthly parking Dubai, rent parking space Dubai, Dubai Marina parking, Downtown Dubai parking, DIFC parking, Business Bay parking, Palm Jumeirah parking, earn from parking Dubai" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="googlebot" content="index, follow" />
    <link rel="alternate" hreflang="en" href="https://shazamparking.ae/" />
    <link rel="canonical" href="https://shazamparking.ae/" />
    
    <!-- Favicon -->
    <link rel="icon" href="/lovable-uploads/cc70ca6e-a718-4baf-b612-9ddb5c9f07d4.webp" type="image/png">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Shazam Parking - Dubai's Trusted Parking Platform" />
    <meta property="og:description" content="Find and book parking spaces in Dubai with Shazam Parking. List your parking space and start earning monthly income. Secure, convenient, and trusted by Dubai residents." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shazamparking.ae" />
    <meta property="og:image" content="/shazam-parking-og-image.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Shazam Parking" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shazam Parking - Dubai's Trusted Parking Platform" />
    <meta name="twitter:description" content="Find and book parking spaces in Dubai with Shazam Parking. List your parking space and start earning monthly income." />
    <meta name="twitter:image" content="/shazam-parking-og-image.webp" />
    
    <!-- Structured Data: Organization + Ecosystem -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://shazamparking.ae/#organization",
      "name": "Shazam Parking",
      "alternateName": "ShazamParking",
      "description": "Dubai's trusted long-term parking marketplace — book monthly parking or earn from unused spaces.",
      "url": "https://shazamparking.ae",
      "logo": "https://shazamparking.ae/shazam-parking-og-image.webp",
      "image": "https://shazamparking.ae/shazam-parking-og-image.webp",
      "parentOrganization": {
        "@type": "Organization",
        "name": "Shazam",
        "url": "https://shazam.ae/",
        "description": "Shazam is a Dubai-based ecosystem of connected digital products that simplify life in Dubai."
      },
      "subjectOf": [
        {
          "@type": "WebSite",
          "name": "Dubai Life OS",
          "url": "https://dubailifeos.ae",
          "description": "Personal operating system for managing life in Dubai."
        },
        {
          "@type": "WebSite",
          "name": "Dubai Life Maps",
          "url": "https://dubailifemaps.ae/",
          "description": "Interactive city intelligence map for Dubai."
        }
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "support@shazam.ae",
        "areaServed": "AE",
        "availableLanguage": ["en", "ar"]
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Dubai",
        "addressCountry": "AE"
      },
      "sameAs": [
        "https://shazam.ae/",
        "https://dubailifeos.ae",
        "https://dubailifemaps.ae/",
        "https://www.instagram.com/shazamparking",
        "https://www.linkedin.com/company/shazamparking"
      ]
    }
    </script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://shazamparking.ae/#website",
      "url": "https://shazamparking.ae/",
      "name": "Shazam Parking",
      "publisher": { "@id": "https://shazamparking.ae/#organization" },
      "inLanguage": "en",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://shazamparking.ae/find-a-parking-space?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root">
      <div class="hero-loading">
        <div class="brand">Shazam Parking</div>
        <div class="ring" aria-label="Loading"></div>
        <div class="tag">Dubai · Premium</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
